name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      frontend-command:
        description: 'Frontend npm command to run (or "all" for full suite). test:watch is only for local use (via start.sh).'
        type: choice
        options:
          - all
          - build
          - lint
          - test
          - typecheck
        default: all

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build and run tests
        run: mvn test --batch-mode -e
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Print surefire error details (on failure)
        if: ${{ failure() }}
        run: |
          echo "=== Surefire TXT Reports ==="
          cat target/surefire-reports/*.txt 2>/dev/null || echo "No TXT reports found"
          echo "=== First XML report (truncated) ==="
          head -200 target/surefire-reports/*.xml 2>/dev/null || echo "No XML reports found"

      - name: Upload test results (on failure)
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/target/surefire-reports/
          retention-days: 7

  frontend-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend commands
        run: |
          COMMAND="${{ github.event_name == 'workflow_dispatch' && inputs.frontend-command || 'all' }}"
          if [ "$COMMAND" = "all" ]; then
            npm run typecheck
            npm test
            npm run lint
          else
            npm run "$COMMAND"
          fi
