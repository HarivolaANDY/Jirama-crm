# ── Grafana Datasource Provisioning ──────────
# JIRAMA CRM — Monitoring Dashboards
# Automatically configured on Grafana startup

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      queryTimeout: "30s"
      httpMethod: "POST"

  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: "traceID"
          matcherRegex: "trace_id=(\\w+)"
          url: "http://tempo:3200/explore?traceId=$${__value.raw}"
    # Note: Requires Loki and Tempo if log aggregation is needed
