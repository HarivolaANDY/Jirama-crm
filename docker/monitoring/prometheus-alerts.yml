# ── Prometheus Alert Rules ──────────────────
# JIRAMA CRM — Incident Detection

groups:
  - name: jirama-backend
    interval: 30s
    rules:
      # ── Backend Availability ──
      - alert: BackendDown
        expr: up{job="backend"} == 0
        for: 1m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: "Backend API is down"
          description: "The backend service has been unreachable for more than 1 minute."

      - alert: BackendHighErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) / rate(http_server_requests_seconds_count[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: "High API error rate"
          description: "Error rate is {{ humanizePercentage $value }} (threshold: 5%)"

      - alert: BackendHighLatency
        expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "High API latency"
          description: "P95 latency is {{ humanizeDuration $value }} (threshold: 2s)"

      - alert: DatabaseConnectionPoolExhausted
        expr: hikaricp_connections_active / hikaricp_connections_max > 0.8
        for: 2m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "{{ humanizePercentage $value }} of connections in use (threshold: 80%)"

  - name: jirama-infrastructure
    interval: 1m
    rules:
      # ── Disk Space ──
      - alert: DiskSpaceLow
        expr: node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} < 0.1
        for: 5m
        labels:
          severity: critical
          service: infrastructure
        annotations:
          summary: "Low disk space"
          description: "Disk is {{ humanizePercentage $value }} free (threshold: 10%)"

      - alert: DiskSpaceWarning
        expr: node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} < 0.2
        for: 10m
        labels:
          severity: warning
          service: infrastructure
        annotations:
          summary: "Low disk space warning"
          description: "Disk is {{ humanizePercentage $value }} free (threshold: 20%)"

      # ── Memory ──
      - alert: HighMemoryUsage
        expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 0.9
        for: 5m
        labels:
          severity: warning
          service: infrastructure
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ humanizePercentage $value }} (threshold: 90%)"

  - name: jirama-database
    interval: 1m
    rules:
      - alert: PostgresDown
        expr: pg_up == 0
        for: 30s
        labels:
          severity: critical
          service: database
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL instance is unreachable."

      - alert: PostgresConnectionsHigh
        expr: sum(pg_stat_activity_count) > 150
        for: 2m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "High database connections"
          description: "PostgreSQL has {{ $value }} active connections (threshold: 150)"
