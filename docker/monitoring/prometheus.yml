# ── Prometheus Configuration ─────────────────
# JIRAMA CRM — Metrics Collection

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Rule files
rule_files:
  - "prometheus-alerts.yml"

# Scrape targets
scrape_configs:

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "monitoring"
          app: "jirama"

  # Backend API (Spring Boot Actuator)
  - job_name: "backend"
    metrics_path: "/api/actuator/prometheus"
    static_configs:
      - targets: ["backend:8080"]
        labels:
          service: "backend"
          app: "jirama"
    # Customize relabeling for better metric labels
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "backend"
    # Scrape every 10 seconds for more granular API metrics
    scrape_interval: 10s

  # Nginx (stub_status must be enabled in nginx config)
  - job_name: "nginx"
    static_configs:
      - targets: ["nginx:80"]
        labels:
          service: "reverse-proxy"
          app: "jirama"
    metrics_path: "/stub_status"

  # Keycloak
  - job_name: "keycloak"
    metrics_path: "/realms/jirama/metrics"
    static_configs:
      - targets: ["keycloak:8080"]
        labels:
          service: "iam"
          app: "jirama"
    scheme: http

# Container-level metrics (if using cAdvisor)
# - job_name: "cadvisor"
#   static_configs:
#     - targets: ["cadvisor:8080"]

# Additional exporters (add their containers to compose to enable):
# PostgreSQL:  - job_name: "postgres"
#               static_configs: [{ targets: ["postgres-exporter:9187"] }]
# Redis:       - job_name: "redis"
#               static_configs: [{ targets: ["redis-exporter:9121"] }]
# Host:        - job_name: "node"
#               static_configs: [{ targets: ["node-exporter:9100"] }]
