# ── Shared locations (included by both HTTP and HTTPS servers) ──
# The main server block handles both dev and prod routing
server {
    listen 80 default_server;
    server_name _;

    # ── Frontend Static Files ──
    root /var/www/static;
    index index.html;

    # SPA: all non-file routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|webp|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Service worker: never cache
        location = /sw.js {
            add_header Cache-Control "no-cache, must-revalidate";
            access_log off;
        }
    }

    # ── API Proxy ──
    location /api/ {
        limit_req zone=api burst=200 nodelay;

        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 120s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 8k;

        # CORS headers
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Idempotency-Key" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── Keycloak Auth Proxy ──
    location /auth/ {
        limit_req zone=auth burst=10 nodelay;

        proxy_pass http://keycloak:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;
    }

    # ── Security Headers ──
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # ── Deny Hidden Files ──
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Deny Sensitive Paths ──
    location ~ /(?:node_modules|src|\.git|\.env) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Nginx stub_status for Prometheus ──
    location /stub_status {
        stub_status;
        access_log off;
        allow 172.20.0.0/16;
        deny all;
    }
}
