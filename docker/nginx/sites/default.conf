# ── HTTP → HTTPS Redirect (production only) ──
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # In development, serve directly on HTTP
    # In production, uncomment the redirect below and set up SSL certs
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Nginx stub_status for Prometheus monitoring
    location /stub_status {
        stub_status;
        access_log off;
        allow 172.20.0.0/16;
        deny all;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
    }
}

