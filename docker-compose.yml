version: "3.9"

name: jirama

# ───────────────────────────────────────────────
# JIRAMA CRM — Full Infrastructure Stack
# Services: nginx, frontend, backend, keycloak,
#           postgres, redis, minio, prometheus,
#           grafana, alertmanager
# ───────────────────────────────────────────────

services:
  # ── Reverse Proxy ────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: jirama-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/sites/:/etc/nginx/conf.d/:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - frontend_dist:/var/www/static:ro
      - ./docker/nginx/logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_started
      keycloak:
        condition: service_healthy
    networks:
      - jirama_net
    restart: unless-stopped
    labels:
      - "app=jirama"
      - "service=nginx"

  # ── Frontend (Static Builder) ────────────────
  frontend-builder:
    image: node:22-alpine
    container_name: jirama-frontend-builder
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - frontend_dist:/app/dist
    command: sh -c "npm install && npm run build"
    networks:
      - jirama_net
    profiles:
      - build
    labels:
      - "app=jirama"
      - "service=frontend-builder"

  # ── Backend API ─────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jirama-backend
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/jirama
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-jirama_app}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS:?Database password required}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASS:?Redis password required}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/jirama
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWKSET_URI: http://keycloak:8080/realms/jirama/protocol/openid-connect/certs
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-jirama}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MinIO password required}
      MINIO_BUCKET: jirama-documents
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost}
      SERVER_SERVLET_CONTEXT_PATH: /api
      SERVER_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    volumes:
      - backend_logs:/var/log/app
    networks:
      - jirama_net
    restart: unless-stopped
    labels:
      - "app=jirama"
      - "service=backend"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ── Keycloak (IAM) ──────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: jirama-keycloak
    command: start --import-realm --hostname-strict-https=false
    environment:
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-localhost}
      KC_HOSTNAME_PORT: 8081
      KC_HTTP_PORT: 8080
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: keycloak
      KC_DB_URL_PROPERTIES: "?sslmode=prefer"
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASS:?Keycloak DB password required}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASS:?Keycloak admin password required}
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - jirama_net
    restart: unless-stopped
    labels:
      - "app=jirama"
      - "service=keycloak"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ── PostgreSQL ├─────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: jirama-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-jirama_app}
      POSTGRES_PASSWORD: ${DB_PASS:?Database password required}
      POSTGRES_DB: jirama
      JIRAMA_DB: jirama
      KEYCLOAK_DB: keycloak
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/01-init-multiple-dbs.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - jirama_net
    restart: unless-stopped
    labels:
      - "app=jirama"
      - "service=postgres"
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # ── Redis ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: jirama-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASS:?Redis password required}
      --appendonly yes
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - jirama_net
    restart: unless-stopped
    labels:
      - "app=jirama"
      - "service=redis"

  # ── MinIO (Object Storage) ─────────────────
  minio:
    image: minio/minio:latest
    container_name: jirama-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-jirama}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MinIO password required}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - jirama_net
    restart: unless-stopped
    labels:
      - "app=jirama"
      - "service=minio"

  # ── MinIO Bucket Setup (one-shot) ──────────
  minio-setup:
    image: minio/mc:latest
    container_name: jirama-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set jirama http://minio:9000 ${MINIO_ROOT_USER:-jirama} ${MINIO_ROOT_PASSWORD:?MinIO password required};
      mc mb jirama/jirama-documents --ignore-existing;
      mc policy set download jirama/jirama-documents;
      echo 'MinIO buckets created successfully';
      "
    networks:
      - jirama_net
    profiles:
      - setup

  # ── Prometheus ├────────────────────────────
  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: jirama-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    volumes:
      - ./docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - jirama_net
    restart: unless-stopped
    labels:
      - "app=jirama"
      - "service=prometheus"

  # ── Grafana ────────────────────────────────
  grafana:
    image: grafana/grafana:11.4.0
    container_name: jirama-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASS:?Grafana admin password required}
      GF_INSTALL_PLUGINS: grafana-piechart-panel, grafana-worldmap-panel
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - ./docker/monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./docker/monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - jirama_net
    restart: unless-stopped
    labels:
      - "app=jirama"
      - "service=grafana"

  # ── Alertmanager ───────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.28.0
    container_name: jirama-alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=http://localhost:9093"
    volumes:
      - ./docker/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    networks:
      - jirama_net
    restart: unless-stopped
    profiles:
      - monitoring
    labels:
      - "app=jirama"
      - "service=alertmanager"

# ── Volume Definitions ───────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  alertmanager_data:
    driver: local
  backend_logs:
    driver: local
  frontend_dist:
    driver: local

# ── Network ──────────────────────────────────
networks:
  jirama_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
