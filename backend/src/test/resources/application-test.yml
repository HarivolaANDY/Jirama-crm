spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

  # Override datasource for tests — connects to service container (CI) or local PostgreSQL
  # CI always starts a PostgreSQL service container with test/test/jirama_test.
  # Override via SPRING_DATASOURCE_* env vars for different credentials.
  datasource:
    url: jdbc:postgresql://localhost:5432/jirama_test
    username: test
    password: test
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        cache:
          use_second_level_cache: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/jirama
          jwk-set-uri: http://localhost:8081/realms/jirama/protocol/openid-connect/certs

logging:
  level:
    com.jirama: DEBUG
    org.testcontainers: INFO
