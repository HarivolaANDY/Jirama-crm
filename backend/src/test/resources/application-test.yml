spring:
  # Override datasource for tests — TestContainers provides the URL
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///jirama_test
    username: test
    password: test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/jirama
          jwk-set-uri: http://localhost:8081/realms/jirama/protocol/openid-connect/certs

# Disable MinIO in tests
minio:
  endpoint: http://localhost:9000
  access-key: test
  secret-key: test
  bucket: test-bucket

# Disable Redis in tests
spring.data.redis:
  host: localhost
  port: 6379

logging:
  level:
    com.jirama: DEBUG
    org.testcontainers: INFO
